<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>flowerfetch composer — Phase 1</title>
<style>
  :root{
    --fs: 13px;
    --bg:#13111a; --panel:#1c1928; --panel2:#241f33; --ink:#e7e2f3;
    --muted:#9a90b8; --line:#352d4d; --accent:#af78e1; --frame-ui:#8cb978;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Inter',system-ui,sans-serif; font-size:13px;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    display:flex; align-items:center; gap:14px; padding:8px 14px;
    background:var(--panel); border-bottom:1px solid var(--line);
  }
  header h1{font-size:14px; margin:0; font-weight:600; letter-spacing:.3px}
  header h1 span{color:var(--accent)}
  header .tag{font-size:11px; color:var(--muted); padding:2px 8px; border:1px solid var(--line); border-radius:99px}
  header .spacer{flex:1}
  button{
    font:inherit; font-size:12px; color:var(--ink); background:var(--panel2);
    border:1px solid var(--line); border-radius:6px; padding:5px 10px; cursor:pointer;
  }
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent); color:#1a1024; border-color:var(--accent); font-weight:600}
  main{display:grid; grid-template-columns:210px 1fr 1fr; flex:1; min-height:0}
  .col{display:flex; flex-direction:column; min-height:0; border-right:1px solid var(--line)}
  .col:last-child{border-right:none}
  .col h2{
    font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted);
    margin:0; padding:9px 12px; background:var(--panel); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:8px;
  }
  .col h2 .spacer{flex:1}
  .scroll{overflow:auto; flex:1; min-height:0}

  /* layers list */
  .layer{
    display:flex; align-items:center; gap:8px; padding:9px 12px; cursor:pointer;
    border-bottom:1px solid var(--line); font-size:12.5px;
  }
  .layer:hover{background:var(--panel2)}
  .layer.active{background:var(--panel2); box-shadow:inset 3px 0 0 var(--accent)}
  .layer .dot{width:8px;height:8px;border-radius:2px;background:var(--frame-ui);flex:none}
  .layer .dot.info{background:var(--accent)}
  .layer .dot.muted{background:var(--line)}
  .layer .name{flex:1}
  .layer .meta{color:var(--muted); font-size:10.5px}

  .conf{padding:10px 12px; border-top:1px solid var(--line); background:var(--panel)}
  .conf h3{font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin:0 0 8px}
  .row{display:flex; align-items:center; gap:8px; margin-bottom:7px}
  .row label{flex:1; color:var(--muted); font-size:11.5px}
  .row input[type=number]{width:52px}
  input[type=number],input[type=text]{
    font:inherit; font-size:12px; background:var(--bg); color:var(--ink);
    border:1px solid var(--line); border-radius:5px; padding:3px 6px;
  }
  input[type=color]{width:30px;height:22px;padding:0;border:1px solid var(--line);border-radius:4px;background:none}

  /* editor */
  .edtools{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--line);background:var(--panel)}
  .edtools .hint{color:var(--muted);font-size:11px}
  .edwrap{position:relative; flex:1; min-height:0; overflow:auto; padding:10px 12px;}
  .ruler{
    font-family:'JetBrains Mono','DejaVu Sans Mono',monospace; font-size:var(--fs);
    color:var(--muted); white-space:pre; line-height:1.0; user-select:none; height:1.1em;
    margin-left:2.4em; opacity:.6;
  }
  .gridwrap{position:relative; display:inline-block;}
  textarea#editor{
    font-family:'JetBrains Mono','DejaVu Sans Mono',monospace; font-size:var(--fs);
    line-height:1.2; color:var(--ink); background:transparent;
    border:1px solid var(--line); border-radius:6px; padding:6px; resize:none;
    white-space:pre; overflow:hidden; tab-size:1; caret-color:var(--accent);
    position:relative; z-index:2;
  }
  .gridbg{
    position:absolute; inset:0; z-index:1; border-radius:6px; pointer-events:none;
    background-size:1ch 1.2em;
    background-image:
      linear-gradient(to right, rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.035) 1px, transparent 1px);
    background-position:6px 6px;
  }
  .guide{position:absolute; z-index:3; background:var(--accent); opacity:.85;}
  .guide.col{width:2px; top:0; bottom:0; cursor:ew-resize}
  .guide.row{height:2px; left:0; right:0; cursor:ns-resize; background:var(--frame-ui)}
  .guide .grip{
    position:absolute; background:inherit; color:#1a1024; font-size:9px; font-weight:700;
    padding:1px 4px; border-radius:3px; white-space:nowrap;
  }
  .guide.col .grip{top:-2px; left:3px}
  .guide.row .grip{left:-2px; top:3px; background:var(--frame-ui)}

  /* preview */
  .preview{
    flex:1; min-height:0; overflow:auto; padding:14px; background:#0d0b12;
  }
  pre#composed{
    font-family:'JetBrains Mono','DejaVu Sans Mono',monospace; font-size:var(--fs);
    line-height:1.18; margin:0; white-space:pre;
  }
  .zoom{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:11px}
  .zoom input{width:90px}
  .note{padding:8px 12px;color:var(--muted);font-size:11px;border-top:1px solid var(--line);background:var(--panel)}
  .file-in{display:none}
  .mini{font-size:11px;padding:3px 8px}
</style>
</head>
<body>
<header>
  <h1>flower<span>fetch</span> composer</h1>
  <span class="tag">Phase 1 · text layers + live preview</span>
  <div class="spacer"></div>
  <button class="mini" id="resetBtn">Reset to embedded</button>
  <button class="primary" id="exportBtn">⬇ Export files</button>
</header>

<main>
  <!-- LEFT: layers + conf -->
  <section class="col">
    <h2>Layers / sources</h2>
    <div class="scroll" id="layers"></div>
    <div class="conf">
      <h3>flowerfetch.conf</h3>
      <div class="row"><label>Info nuzzle column (SEP_TXT_COL)</label><input type="number" id="sepCol" min="0" max="40"></div>
      <div class="row"><label>Stem start row (STEM_START)</label><input type="number" id="stemStart" min="0" max="40"></div>
      <div class="row"><label>Logo↔frame gap (spaces)</label><input type="number" id="gap" min="0" max="20"></div>
      <div class="row"><label>Frame color (FRAME_RGB)</label><input type="color" id="frameCol"></div>
      <div class="row"><label>Text color (TEXT_RGB)</label><input type="color" id="textCol"></div>
    </div>
  </section>

  <!-- MIDDLE: editor -->
  <section class="col">
    <h2><span id="edTitle">Logo</span><div class="spacer"></div>
      <button class="mini" id="loadBtn">Load file…</button>
      <input type="file" id="fileIn" class="file-in" accept=".txt,text/plain">
    </h2>
    <div class="edtools">
      <span class="hint" id="edHint"></span>
    </div>
    <div class="edwrap">
      <div class="ruler" id="ruler"></div>
      <div class="gridwrap" id="gridwrap">
        <div class="gridbg" id="gridbg"></div>
        <textarea id="editor" spellcheck="false" wrap="off"></textarea>
        <div class="guide col" id="guideCol" style="display:none"><span class="grip" id="gripCol">col</span></div>
        <div class="guide row" id="guideRow" style="display:none"><span class="grip" id="gripRow">row</span></div>
      </div>
    </div>
  </section>

  <!-- RIGHT: live preview -->
  <section class="col">
    <h2>Live composed preview
      <div class="spacer"></div>
      <div class="zoom">A<input type="range" id="zoom" min="9" max="22" value="13">A</div>
    </h2>
    <div class="preview"><pre id="composed"></pre></div>
    <div class="note" id="previewNote"></div>
  </section>
</main>

  gtop: '4qCA4qKA4qOg4qCk4qCS4qCS4qCS4qCT4qCS4qCa4qCb4qC74qC/4qO24qO24qCm4qOE4qOA4qOA4qOA4qOg4qOE4qOA4qOA4qOA4qOA4qOA4qGA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qKA4qOA4qOA4qCA4qCACuKjtOKgi+KggOKggOKggOKggOKggOKggOKggOKggOKjgOKgpOKjluKjkuKjveKjv+Kjv+Kgv+KjtuKgkuKgkuKgkuKgkuKgkuKgkuKgkuKgkuKgreKijeKhiOKgieKgkuKgkuKgkuKgkuKgtuKgpOKgpOKipOKjhOKjgOKjgOKjgOKjgOKju+Kjn+KjqOKgv+KgggrioJnioKbio6Tio7bio6TioIDioIDio6Dio7bio7/iobbioJ/ioJvioInioIDioqDioI/ioIDio7jioIfioIDioIDioIDioIDio7TiorbiobbioIDioIDioIjiorPioYTioIDioIDioIDioIDioIDioIDioIDioIDioIDioIDioIDioIjioIHioIDioIDioIDioIAK4qCA4qCA4qCA4qKJ4qCB4qKA4qO34qG/4qC74qKn4qOk4qOk4qOk4qGk4qCW4qCB4qOg4qG24qCL4qCD4qCA4qCA4qCA4qCA4qCY4qCS4qCy4qC24qC24qCS4qCL4qCB4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCA4qCACg==',

EMB.gbot = ''; // unused in Phase 1 preview (garland_bot is not composited)

function b64(s){ return new TextDecoder().decode(Uint8Array.from(atob(s), c=>c.charCodeAt(0))); }

// ---- state ----------------------------------------------------------------
const DEFAULTS = {
  logo: b64(EMB.logo), stem: b64(EMB.stem), gtop: b64(EMB.gtop),
  gbot: '', info: b64(EMB.info),
  sepCol:7, stemStart:9, gap:2, frame:[140,185,120], text:[175,120,225]
};
const state = structuredClone(DEFAULTS);

const SOURCES = [
  {key:'logo', name:'Logo',          file:'logo.txt',         cls:''},
  {key:'gtop', name:'Garland (top)', file:'garland_top.txt',  cls:''},
  {key:'stem', name:'Floral stem',   file:'floral_sep.txt',   cls:''},
  {key:'gbot', name:'Garland (bot)', file:'garland_bot.txt',  cls:'muted', meta:'unused'},
  {key:'info', name:'Info (sample)', file:'(runtime)',        cls:'info',  meta:'preview only'},
];
let active = 'logo';

// ---- helpers --------------------------------------------------------------
const $ = id => document.getElementById(id);
const srcLines = s => s.replace(/\n$/, '').split('\n');
const visLen = s => Array.from(s).length;
const padTo = (s,w) => s + ' '.repeat(Math.max(0, w - visLen(s)));
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const rgbCss = a => `rgb(${a[0]},${a[1]},${a[2]})`;
const toHex = a => '#'+a.map(n=>n.toString(16).padStart(2,'0')).join('');
const fromHex = h => [1,3,5].map(i=>parseInt(h.slice(i,i+2),16));

// ---- compositing (faithful port of flowerfetch.sh) ------------------------
function compose(){
  const LOGOa = srcLines(state.logo);
  const SIDEa = srcLines(state.stem);
  const GTOPa = srcLines(state.gtop);
  const INFOa = srcLines(state.info);
  const n = INFOa.length;
  const MID = [];
  for(const l of GTOPa) MID.push({type:'g', text:l});
  for(let k=0;k<n;k++){
    const srow = SIDEa[state.stemStart+k] ?? '';
    const prefix = Array.from(srow).slice(0, state.sepCol).join('');
    MID.push({type:'s', stem:prefix, info:INFOa[k]});
  }
  const total = MID.length;
  let lw=0; for(const l of LOGOa){ const v=visLen(l); if(v>lw) lw=v; }
  const lr = LOGOa.length;
  let canvas = total; if(lr>canvas) canvas=lr;
  const ltop = Math.floor((canvas-lr)/2);
  const mtop = Math.floor((canvas-total)/2);
  const rows=[];
  for(let i=0;i<canvas;i++){
    const li=i-ltop;
    const logo = (li>=0 && li<lr) ? padTo(LOGOa[li], lw) : ' '.repeat(lw);
    const mi=i-mtop;
    const mid = (mi>=0 && mi<total) ? MID[mi] : null;
    rows.push({logo, mid});
  }
  return {rows, total, lr, canvas, lw};
}

function renderPreview(){
  const {rows} = compose();
  const frame = rgbCss(state.frame), text = rgbCss(state.text);
  const GAP = ' '.repeat(state.gap);
  let html='';
  for(const r of rows){
    html += `<span style="color:${frame}">${esc(r.logo)}</span>`;
    html += esc(GAP);
    if(r.mid){
      if(r.mid.type==='g') html += `<span style="color:${frame}">${esc(r.mid.text)}</span>`;
      else html += `<span style="color:${frame}">${esc(r.mid.stem)}</span><span style="color:${text}">${esc(r.mid.info)}</span>`;
    }
    html += '\n';
  }
  $('composed').innerHTML = html;
  const c = compose();
  $('previewNote').textContent =
    `composited ${c.canvas} rows · logo ${c.lr} rows ×${c.lw} cols · info ${srcLines(state.info).length} lines · `+
    `garland_bot is NOT used by the current layout`;
}

// ---- layers panel ---------------------------------------------------------
function renderLayers(){
  const wrap = $('layers'); wrap.innerHTML='';
  for(const s of SOURCES){
    const div = document.createElement('div');
    div.className = 'layer'+(s.key===active?' active':'');
    div.innerHTML = `<span class="dot ${s.cls}"></span><span class="name">${s.name}</span>`+
                    (s.meta?`<span class="meta">${s.meta}</span>`:`<span class="meta">${s.file}</span>`);
    div.onclick = () => { active=s.key; renderLayers(); loadEditor(); };
    wrap.appendChild(div);
  }
}

// ---- editor ---------------------------------------------------------------
const editor = $('editor');
function curSource(){ return SOURCES.find(s=>s.key===active); }
function loadEditor(){
  const s = curSource();
  $('edTitle').textContent = s.name + (s.meta?` — ${s.meta}`:'');
  $('edHint').textContent = active==='stem'
    ? 'Drag the purple line = info nuzzle column · the green line = stem start row'
    : (active==='info' ? 'Sample info for preview — NOT exported (real info comes from fastfetch).'
    : (active==='gbot' ? 'Not used by the current flowerfetch layout (kept for later phases).'
    : 'Edit the art; the live preview updates as you type.'));
  editor.value = state[active] || '';
  sizeEditor();
  updateGuides();
}
function sizeEditor(){
  const lines = editor.value.split('\n');
  editor.rows = Math.max(lines.length, 4);
  editor.cols = Math.max(...lines.map(l=>Array.from(l).length), 10) + 2;
  $('gridbg').style.width = editor.offsetWidth+'px';
  $('gridbg').style.height = editor.offsetHeight+'px';
  // ruler
  const w = editor.cols;
  let r=''; for(let i=0;i<w;i++) r += (i%10===0)? String((i/10)|0%10) : ' ';
  $('ruler').textContent = r;
}
editor.addEventListener('input', ()=>{
  state[active] = editor.value;
  sizeEditor(); updateGuides(); renderPreview();
});

// ---- guides (draggable SEP_TXT_COL / STEM_START on the stem editor) --------
let cell = {w:8, h:16};
function measureCell(){
  const probe = document.createElement('span');
  probe.style.cssText = `position:absolute;visibility:hidden;font-family:'JetBrains Mono','DejaVu Sans Mono',monospace;font-size:var(--fs);line-height:1.2;white-space:pre`;
  probe.textContent = '0000000000';
  document.body.appendChild(probe);
  const r = probe.getBoundingClientRect();
  cell.w = r.width/10; cell.h = r.height;
  probe.remove();
}
function updateGuides(){
  const gc=$('guideCol'), gr=$('guideRow');
  if(active!=='stem'){ gc.style.display='none'; gr.style.display='none'; return; }
  measureCell();
  const pad=6; // textarea padding
  gc.style.display='block'; gr.style.display='block';
  gc.style.left = (pad + state.sepCol*cell.w)+'px';
  gr.style.top  = (pad + state.stemStart*cell.h)+'px';
  $('gripCol').textContent = 'col '+state.sepCol;
  $('gripRow').textContent = 'row '+state.stemStart;
}
function dragGuide(e, axis){
  e.preventDefault();
  const wrapRect = $('gridwrap').getBoundingClientRect();
  const move = ev => {
    measureCell();
    if(axis==='col'){
      const col = Math.max(0, Math.round((ev.clientX - wrapRect.left - 6)/cell.w));
      state.sepCol = Math.min(col, 40); $('sepCol').value = state.sepCol;
    } else {
      const row = Math.max(0, Math.round((ev.clientY - wrapRect.top - 6)/cell.h));
      state.stemStart = Math.min(row, 40); $('stemStart').value = state.stemStart;
    }
    updateGuides(); renderPreview();
  };
  const up = ()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); };
  document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
}
$('guideCol').addEventListener('mousedown', e=>dragGuide(e,'col'));
$('guideRow').addEventListener('mousedown', e=>dragGuide(e,'row'));

// ---- conf controls --------------------------------------------------------
function syncConfInputs(){
  $('sepCol').value=state.sepCol; $('stemStart').value=state.stemStart; $('gap').value=state.gap;
  $('frameCol').value=toHex(state.frame); $('textCol').value=toHex(state.text);
}
$('sepCol').oninput   = e=>{ state.sepCol=+e.target.value||0; updateGuides(); renderPreview(); };
$('stemStart').oninput= e=>{ state.stemStart=+e.target.value||0; updateGuides(); renderPreview(); };
$('gap').oninput      = e=>{ state.gap=+e.target.value||0; renderPreview(); };
$('frameCol').oninput = e=>{ state.frame=fromHex(e.target.value); renderPreview(); };
$('textCol').oninput  = e=>{ state.text=fromHex(e.target.value); renderPreview(); };

// ---- zoom -----------------------------------------------------------------
$('zoom').oninput = e=>{
  document.documentElement.style.setProperty('--fs', e.target.value+'px');
  sizeEditor(); updateGuides();
};

// ---- load file / reset ----------------------------------------------------
$('loadBtn').onclick = ()=> $('fileIn').click();
$('fileIn').onchange = e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ state[active]=rd.result; loadEditor(); renderPreview(); };
  rd.readAsText(f); e.target.value='';
};
$('resetBtn').onclick = ()=>{
  if(!confirm('Reset all sources and settings to the embedded defaults?')) return;
  Object.assign(state, structuredClone(DEFAULTS));
  syncConfInputs(); loadEditor(); renderPreview();
};

// ---- export ---------------------------------------------------------------
function confText(){
  return `# flowerfetch.conf — tuning values for flowerfetch.sh.
# This file is sourced by flowerfetch.sh and is also written by composer.html.
# Keep it plain KEY=VALUE so the editor can regenerate it safely.

SEP_TXT_COL=${state.sepCol}
STEM_START=${state.stemStart}
GAP="${' '.repeat(state.gap)}"
FRAME_RGB="${state.frame.join(' ')}"
TEXT_RGB="${state.text.join(' ')}"
`;
}
function ensureNL(s){ return s.endsWith('\n') ? s : s+'\n'; }
function download(name, text){
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
}
$('exportBtn').onclick = async ()=>{
  const files=[
    ['logo.txt', ensureNL(state.logo)],
    ['floral_sep.txt', ensureNL(state.stem)],
    ['garland_top.txt', ensureNL(state.gtop)],
    ['flowerfetch.conf', confText()],
  ];
  for(const [n,t] of files){ download(n,t); await new Promise(r=>setTimeout(r,250)); }
};

// ---- boot -----------------------------------------------------------------
syncConfInputs(); renderLayers(); loadEditor(); renderPreview();
</script>
</body>
</html>
