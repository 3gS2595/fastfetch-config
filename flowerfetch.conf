# flowerfetch.conf — tuning values for flowerfetch.sh.
# This file is sourced by flowerfetch.sh and is also written by composer.html.
# Keep it plain KEY=VALUE so the editor can regenerate it safely.

# Column of the floral stem where the info text nests against it.
SEP_TXT_COL=7

# First clean stem row in floral_sep.txt where the info block begins.
STEM_START=9

# Spaces between the logo and the floral block.
GAP="  "

# Floral / frame color, as "R G B" (each 0-255).
FRAME_RGB="140 185 120"

# Info text color, as "R G B" (each 0-255).
TEXT_RGB="175 120 225"
